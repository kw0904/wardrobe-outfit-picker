<!DOCTYPE html>
<html>
<head>
  <title>Wardrobe Outfit Picker</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
      max-width: 900px;
      margin: 0 auto;
      padding: 32px;
    }

    h1 {
      margin-bottom: 8px;
    }

    p {
      color: #555;
    }

    .section {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
      border: 1px solid #ddd;
    }

    input, select, button {
      padding: 10px;
      margin: 6px 4px 6px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      background: #222;
      color: white;
      border: none;
    }

    button:hover {
      background: #444;
    }

    .danger {
      background: #8b0000;
    }

    .danger:hover {
      background: #a00000;
    }

    ul {
      padding-left: 0;
      list-style: none;
    }

    li {
      background: #f9f9f9;
      margin: 8px 0;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #eee;
    }

    pre {
      background: #f9f9f9;
      padding: 20px;
      border-radius: 12px;
      white-space: pre-wrap;
      line-height: 1.5;
      border: 1px solid #eee;
      font-family: Arial, sans-serif;
    }

    .app-header {
      margin-bottom: 24px;
    }
  </style>
</head>

<body>
  <div class="app-header">
    <h1>Wardrobe Outfit Picker</h1>
    <p>Pick what to wear from your wardrobe, then see what item could improve the look.</p>
  </div>

  <div class="section">
    <h2>Add Clothes</h2>

    <input id="itemName" placeholder="Item name, e.g. Black T-shirt">

    <select id="category">
      <option value="shirt">Shirt</option>
      <option value="pants">Pants</option>
      <option value="shoes">Shoes</option>
      <option value="socks">Socks</option>
      <option value="hat">Hat</option>
      <option value="outerwear">Outerwear</option>
    </select>

    <select id="color">
      <option value="black">Black</option>
      <option value="white">White</option>
      <option value="blue">Blue</option>
      <option value="brown">Brown</option>
      <option value="beige">Beige</option>
      <option value="gray">Gray</option>
      <option value="green">Green</option>
      <option value="red">Red</option>
    </select>

    <select id="itemStyle">
      <option value="casual">Casual</option>
      <option value="elegant">Elegant</option>
      <option value="streetwear">Streetwear</option>
      <option value="geeky">Geeky</option>
    </select>

    <button onclick="addItem()">Add Item</button>
  </div>

  <div class="section">
    <h2>Your Wardrobe</h2>
    <button class="danger" onclick="clearWardrobe()">Clear Wardrobe</button>
    <ul id="wardrobeList"></ul>
  </div>

  <div class="section">
    <h2>Choose Style Goal</h2>

    <select id="styleGoal">
      <option value="casual">Casual</option>
      <option value="elegant">Elegant</option>
      <option value="streetwear">Streetwear</option>
      <option value="geeky">Geeky</option>
    </select>

    <button onclick="generateOutfit()">Pick Outfit</button>
  </div>

  <div class="section">
    <h2>Suggested Outfit</h2>
    <pre id="outfitResult">No outfit picked yet.</pre>
  </div>

  <script>
    let wardrobe = JSON.parse(localStorage.getItem("wardrobe")) || [];

    showWardrobe();

    function saveWardrobe() {
      localStorage.setItem("wardrobe", JSON.stringify(wardrobe));
    }

    function addItem() {
      let name = document.getElementById("itemName").value;
      let category = document.getElementById("category").value;
      let color = document.getElementById("color").value;
      let style = document.getElementById("itemStyle").value;

      if (name === "") {
        alert("Please enter item name");
        return;
      }

      let item = {
        name: name,
        category: category,
        color: color,
        style: style
      };

      wardrobe.push(item);
      saveWardrobe();

      document.getElementById("itemName").value = "";
      showWardrobe();
    }

    function showWardrobe() {
      let list = document.getElementById("wardrobeList");
      list.innerHTML = "";

      if (wardrobe.length === 0) {
        let emptyItem = document.createElement("li");
        emptyItem.innerText = "No items yet.";
        list.appendChild(emptyItem);
        return;
      }

      wardrobe.forEach(function(item, index) {
        let listItem = document.createElement("li");
        listItem.innerText =
          item.name + " - " + item.category + " - " + item.color + " - " + item.style;

        let removeButton = document.createElement("button");
        removeButton.innerText = "Remove";
        removeButton.onclick = function() {
          wardrobe.splice(index, 1);
          saveWardrobe();
          showWardrobe();
        };

        listItem.appendChild(document.createTextNode(" "));
        listItem.appendChild(removeButton);
        list.appendChild(listItem);
      });
    }

    function clearWardrobe() {
      wardrobe = [];
      saveWardrobe();
      showWardrobe();
      document.getElementById("outfitResult").innerText = "No outfit picked yet.";
    }

    function getItemsByCategory(category) {
      return wardrobe.filter(function(item) {
        return item.category === category;
      });
    }

    function getRandomItemFromList(items) {
      if (items.length === 0) {
        return null;
      }

      let randomIndex = Math.floor(Math.random() * items.length);
      return items[randomIndex];
    }

    function getBestItem(category, styleGoal) {
      let items = getItemsByCategory(category);

      let matchingStyleItems = items.filter(function(item) {
        return item.style === styleGoal;
      });

      if (matchingStyleItems.length > 0) {
        return getRandomItemFromList(matchingStyleItems);
      }

      let recommendedColors = getStyleRecommendedColors(styleGoal);

      let matchingColorItems = items.filter(function(item) {
        return recommendedColors.includes(item.color);
      });

      if (matchingColorItems.length > 0) {
        return getRandomItemFromList(matchingColorItems);
      }

      return getRandomItemFromList(items);
    }

    function getStyleRecommendedColors(styleGoal) {
      if (styleGoal === "elegant") {
        return ["black", "white", "beige", "gray", "brown"];
      }

      if (styleGoal === "streetwear") {
        return ["black", "white", "gray", "blue", "green"];
      }

      if (styleGoal === "geeky") {
        return ["white", "blue", "brown", "gray", "beige"];
      }

      return ["black", "white", "blue", "brown", "beige", "gray", "green", "red"];
    }

    function getBuySuggestion(styleGoal, missingCategory) {
      let suggestions = {
        elegant: {
          shirt: "White oxford shirt",
          pants: "Black tailored pants",
          shoes: "Brown loafers",
          outerwear: "Navy blazer"
        },
        streetwear: {
          shirt: "Oversized black t-shirt",
          pants: "Cargo pants",
          shoes: "Chunky sneakers",
          outerwear: "Bomber jacket"
        },
        geeky: {
          shirt: "Clean checkered shirt",
          pants: "Straight chino pants",
          shoes: "Simple white sneakers",
          outerwear: "Light cardigan"
        },
        casual: {
          shirt: "Plain white t-shirt",
          pants: "Blue jeans",
          shoes: "White sneakers",
          outerwear: "Denim jacket"
        }
      };

      return suggestions[styleGoal][missingCategory];
    }

    function evaluateItem(item, styleGoal) {
      if (!item) return false;

      let recommendedColors = getStyleRecommendedColors(styleGoal);

      if (item.style === styleGoal) {
        return true;
      }

      if (recommendedColors.includes(item.color)) {
        return true;
      }

      return false;
    }

    function generateOutfit() {
      let styleGoal = document.getElementById("styleGoal").value;

      let shirt = getBestItem("shirt", styleGoal);
      let pants = getBestItem("pants", styleGoal);
      let shoes = getBestItem("shoes", styleGoal);
      let socks = getBestItem("socks", styleGoal);
      let hat = getBestItem("hat", styleGoal);
      let outerwear = getBestItem("outerwear", styleGoal);

      let result = "Style goal: " + styleGoal + "\n\n";

      if (!shirt || !pants || !shoes) {
        result += "Your wardrobe is incomplete.\n\n";

        result += "Missing core items:\n";
        if (!shirt) result += "- Shirt. Suggested buy: " + getBuySuggestion(styleGoal, "shirt") + "\n";
        if (!pants) result += "- Pants. Suggested buy: " + getBuySuggestion(styleGoal, "pants") + "\n";
        if (!shoes) result += "- Shoes. Suggested buy: " + getBuySuggestion(styleGoal, "shoes") + "\n";

        result += "\nAdd these first before the app can build a proper outfit.";

        document.getElementById("outfitResult").innerText = result;
        return;
      }

      result += "Wear this from your wardrobe:\n";
      result += "- Shirt: " + shirt.name + "\n";
      result += "- Pants: " + pants.name + "\n";
      result += "- Shoes: " + shoes.name + "\n";

      if (socks) result += "- Socks: " + socks.name + "\n";
      if (hat) result += "- Hat: " + hat.name + "\n";
      if (outerwear) result += "- Outerwear: " + outerwear.name + "\n";

      let improvementSuggestions = [];

      if (!evaluateItem(shirt, styleGoal)) {
        improvementSuggestions.push("Shirt: " + getBuySuggestion(styleGoal, "shirt"));
      }

      if (!evaluateItem(pants, styleGoal)) {
        improvementSuggestions.push("Pants: " + getBuySuggestion(styleGoal, "pants"));
      }

      if (!evaluateItem(shoes, styleGoal)) {
        improvementSuggestions.push("Shoes: " + getBuySuggestion(styleGoal, "shoes"));
      }

      if (!outerwear && styleGoal !== "casual") {
        improvementSuggestions.push("Outerwear: " + getBuySuggestion(styleGoal, "outerwear"));
      }

      result += "\nComplete this look:\n";

      if (improvementSuggestions.length === 0) {
        result += "Your wardrobe already supports this style well.";
      } else {
        improvementSuggestions.forEach(function(suggestion) {
          result += "- Consider adding " + suggestion + "\n";
        });
      }

      result += "\nStyle diagnosis:\n";

      let styleMatchCount = 0;
      [shirt, pants, shoes, outerwear].forEach(function(item) {
        if (evaluateItem(item, styleGoal)) {
          styleMatchCount++;
        }
      });

      if (styleMatchCount >= 3) {
        result += "Strong fit. Your wardrobe already has enough items for this style.";
      } else if (styleMatchCount === 2) {
        result += "Medium fit. You can create the style, but 1-2 better pieces would improve it.";
      } else {
        result += "Weak fit. Your wardrobe does not strongly support this style yet, so buying a few foundation pieces would help.";
      }

      document.getElementById("outfitResult").innerText = result;
    }
  </script>
</body>
</html>
