<!DOCTYPE html>
<html>
<head>
  <title>Wardrobe Outfit Picker</title>
</head>
<body>
  <h1>Wardrobe Outfit Picker</h1>

  <h2>Add Clothes</h2>

  <input id="itemName" placeholder="Item name, e.g. Black T-shirt">

  <select id="category">
    <option value="shirt">Shirt</option>
    <option value="pants">Pants</option>
    <option value="shoes">Shoes</option>
    <option value="socks">Socks</option>
    <option value="hat">Hat</option>
  </select>

  <select id="color">
    <option value="black">Black</option>
    <option value="white">White</option>
    <option value="blue">Blue</option>
    <option value="brown">Brown</option>
    <option value="beige">Beige</option>
    <option value="gray">Gray</option>
  </select>

  <button onclick="addItem()">Add Item</button>

  <h2>Your Wardrobe</h2>
  <ul id="wardrobeList"></ul>

  <h2>Choose Your Style Goal</h2>

  <select id="styleGoal">
    <option value="casual">Casual</option>
    <option value="elegant">Elegant</option>
    <option value="streetwear">Streetwear</option>
    <option value="geeky">Geeky</option>
  </select>

  <h2>Generate Outfit</h2>
  <button onclick="generateOutfit()">Pick Outfit</button>

  <h2>Suggested Outfit</h2>
  <p id="outfitResult">No outfit picked yet.</p>

  <script>
    let wardrobe = [];

    function addItem() {
      let name = document.getElementById("itemName").value;
      let category = document.getElementById("category").value;
      let color = document.getElementById("color").value;

      if (name === "") {
        alert("Please enter item name");
        return;
      }

      let item = {
        name: name,
        category: category,
        color: color
      };

      wardrobe.push(item);

      document.getElementById("itemName").value = "";

      showWardrobe();
    }

    function showWardrobe() {
      let list = document.getElementById("wardrobeList");
      list.innerHTML = "";

      wardrobe.forEach(function(item) {
        let listItem = document.createElement("li");
        listItem.innerText = item.name + " - " + item.category + " - " + item.color;
        list.appendChild(listItem);
      });
    }

    function getItemsByCategory(category) {
      return wardrobe.filter(function(item) {
        return item.category === category;
      });
    }

    function getRandomItemFromList(items) {
      if (items.length === 0) {
        return null;
      }

      let randomIndex = Math.floor(Math.random() * items.length);
      return items[randomIndex];
    }

    function getStyleRecommendedColors(styleGoal) {
      if (styleGoal === "elegant") {
        return ["black", "white", "beige", "gray", "brown"];
      }

      if (styleGoal === "streetwear") {
        return ["black", "white", "gray", "blue"];
      }

      if (styleGoal === "geeky") {
        return ["white", "blue", "brown", "gray"];
      }

      return ["black", "white", "blue", "brown", "beige", "gray"];
    }

    function getBestItem(category, styleGoal) {
      let items = getItemsByCategory(category);
      let recommendedColors = getStyleRecommendedColors(styleGoal);

      let matchingItems = items.filter(function(item) {
        return recommendedColors.includes(item.color);
      });

      if (matchingItems.length > 0) {
        return getRandomItemFromList(matchingItems);
      }

      return getRandomItemFromList(items);
    }

    function generateOutfit() {
      let styleGoal = document.getElementById("styleGoal").value;

      let shirt = getBestItem("shirt", styleGoal);
      let pants = getBestItem("pants", styleGoal);
      let shoes = getBestItem("shoes", styleGoal);
      let socks = getBestItem("socks", styleGoal);
      let hat = getBestItem("hat", styleGoal);

      if (!shirt || !pants || !shoes) {
        document.getElementById("outfitResult").innerText =
          "Please add at least 1 shirt, 1 pants, and 1 shoes.";
        return;
      }

      let result = "Style goal: " + styleGoal + "\n\n";

      result += "Wear this from your wardrobe:\n";
      result += "Shirt: " + shirt.name + "\n";
      result += "Pants: " + pants.name + "\n";
      result += "Shoes: " + shoes.name + "\n";

      if (socks) {
        result += "Socks: " + socks.name + "\n";
      }

      if (hat) {
        result += "Hat: " + hat.name + "\n";
      }

      result += "\nWhy this works:\n";

      if (styleGoal === "elegant") {
        result += "Elegant style usually works best with neutral colors like black, white, beige, gray, or brown.";
      } else if (styleGoal === "streetwear") {
        result += "Streetwear usually works well with black, white, gray, blue, and stronger casual pieces.";
      } else if (styleGoal === "geeky") {
        result += "Geeky style usually works well with clean, simple colors and slightly classic combinations.";
      } else {
        result += "Casual style is flexible, so this outfit is picked based on what you already own.";
      }

      document.getElementById("outfitResult").innerText = result;
    }
  </script>
</body>
</html>
